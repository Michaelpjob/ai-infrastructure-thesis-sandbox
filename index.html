        if (store.settings.provider !== "stooq" && !store.settings.apiKey) {
          quoteMessage = providers[store.settings.provider] + " needs an API key.";
          render();
          return;
        }
        quoteBusy = true;
        quoteMessage = "Refreshing " + symbols.length + " quote" + (symbols.length === 1 ? "" : "s") + "...";
        render();
        var ok = 0;
        var failed = [];
        for (var i = 0; i < symbols.length; i += 1) {
          var symbol = symbols[i];
          try {
            var quote = await fetchQuote(symbol);
            if (quote && number(quote.price) > 0) {
              store.settings.quoteCache[symbol] = quote;
              ok += 1;
            } else {
              failed.push(symbol);
            }
          } catch (err) {
            failed.push(symbol);
          }
        }
        if (ok) store.settings.lastQuoteRefresh = new Date().toISOString();
        appendTrackingSnapshots();
        quoteBusy = false;
        quoteMessage = ok + " quote" + (ok === 1 ? "" : "s") + " refreshed" + (failed.length ? "; " + failed.length + " failed" : ".");
        saveStore();
        render();
      }

      function quoteUniverse() {
        var symbols = {};
        store.scenarios.forEach(function (s) {
          s.positions.forEach(function (p) {
            if (!p.removedAt && number(p.weight) > 0) symbols[p.symbol] = true;
          });
          if (s.status !== "draft") symbols[BENCHMARK_SYMBOL] = true;
        });
        return Object.keys(symbols);
      }

      async function fetchQuote(symbol) {
        if (store.settings.provider === "finnhub") return fetchFinnhub(symbol);
        if (store.settings.provider === "alphaVantage") return fetchAlphaVantage(symbol);
        return fetchStooq(symbol);
      }

      async function fetchStooq(symbol) {
        var stooqUrl = "https://stooq.com/q/l/?s=" + encodeURIComponent(toStooqSymbol(symbol)) + "&f=sd2t2ohlcv&h&e=csv";
        // Stooq does not send CORS headers, so route through a public passthrough proxy when running on https.
        var url = location.protocol === "https:"
          ? "https://corsproxy.io/?url=" + encodeURIComponent(stooqUrl)
          : stooqUrl;
        var text = await fetchText(url);
        var rows = parseCsv(text);
        if (rows.length < 2) throw new Error("empty response");
        var record = {};
        rows[0].forEach(function (h, i) { record[h] = rows[1][i]; });
        var close = number(record.Close);
        if (!close) throw new Error("no close");
        return { price: close, asOf: safeAsOf(record.Date, record.Time), source: "Stooq" };
      }

      async function fetchFinnhub(symbol) {
        var url = "https://finnhub.io/api/v1/quote?symbol=" + encodeURIComponent(symbol) + "&token=" + encodeURIComponent(store.settings.apiKey);
        var data = await fetchJson(url);
        if (!data || !number(data.c)) throw new Error("no price");
        return { price: number(data.c), asOf: new Date((data.t || Date.now() / 1000) * 1000).toISOString(), source: "Finnhub" };
      }

      async function fetchAlphaVantage(symbol) {
        var url = "https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=" + encodeURIComponent(symbol) + "&apikey=" + encodeURIComponent(store.settings.apiKey);
        var data = await fetchJson(url);
        var quote = data && data["Global Quote"];
        if (!quote || !number(quote["05. price"])) throw new Error(data && data.Note ? "rate limited" : "no price");
        return { price: number(quote["05. price"]), asOf: new Date().toISOString(), source: "Alpha Vantage" };
      }

      function computeQuarterEnds(count) {
        var now = new Date();
        var qMonths = [2, 5, 8, 11];
        var qDays = [31, 30, 30, 31];
        var currentQ = Math.floor(now.getUTCMonth() / 3);
        var year = now.getUTCFullYear();
        var q = currentQ - 1;
        if (q < 0) { q += 4; year -= 1; }
        var ends = [];
        for (var i = 0; i < count; i += 1) {
          ends.unshift(year + "-" + String(qMonths[q] + 1).padStart(2, "0") + "-" + qDays[q]);
          q -= 1;
          if (q < 0) { q += 4; year -= 1; }
        }
        return ends;
      }

      async function backfillHistory() {
        if (backfillBusy || quoteBusy) return;
        if (!store.settings.apiKey) {
          quoteMessage = "Alpha Vantage API key required for backfill (paste in API key field above).";
          render();
          return;
        }
        var symbols = quoteUniverse();
        if (!symbols.length) return;
        var quarterEnds = computeQuarterEnds(4);
        var historicalPrices = {};
        var failed = [];
        var done = 0;
        var stoppedByLimit = false;

        backfillBusy = true;
        render();

        for (var i = 0; i < symbols.length; i += 1) {
          var sym = symbols[i];
          quoteMessage = "Backfill " + (i + 1) + "/" + symbols.length + ": fetching " + sym + " (~13s/ticker, AV free tier)...";
          render();
          try {
            var url = "https://www.alphavantage.co/query?function=TIME_SERIES_MONTHLY_ADJUSTED&symbol=" + encodeURIComponent(sym) + "&apikey=" + encodeURIComponent(store.settings.apiKey);
            var data = await fetchJson(url);
            if (data && (data.Note || data.Information)) {
              stoppedByLimit = true;
              break;
            }
            var series = data && data["Monthly Adjusted Time Series"];
            if (!series) {
              failed.push(sym);
            } else {
              historicalPrices[sym] = {};
              quarterEnds.forEach(function (qEnd) {
                var ym = qEnd.substring(0, 7);
                var match = Object.keys(series).find(function (k) { return k.substring(0, 7) === ym; });
                if (match) {
                  var close = number(series[match]["4. close"]) || number(series[match]["5. adjusted close"]);
                  if (close) historicalPrices[sym][qEnd] = close;
                }
              });
              done += 1;
            }
          } catch (err) {
            failed.push(sym);
          }
          if (i < symbols.length - 1) {
            await new Promise(function (resolve) { setTimeout(resolve, 13000); });
          }
        }

        store.scenarios.forEach(function (scenario) {
          if (scenario.status === "draft") return;
          applyHistoricalSnapshots(scenario, quarterEnds, historicalPrices);
        });

        backfillBusy = false;
        var remaining = symbols.length - i - (stoppedByLimit ? 0 : 1);
        if (stoppedByLimit) {
          quoteMessage = "AV daily limit reached after " + done + " ticker(s). " + (symbols.length - done) + " remaining — try again tomorrow.";
        } else {
          quoteMessage = "Backfilled " + done + " ticker" + (done === 1 ? "" : "s") + (failed.length ? "; " + failed.length + " failed" : ".");
        }
        saveStore();
        render();
      }

      function applyHistoricalSnapshots(scenario, quarterEnds, historicalPrices) {
        var oldestDate = quarterEnds[0];
        var oldestIso = new Date(oldestDate + "T16:00:00Z").toISOString();
        scenario.lockedAt = oldestIso;
        scenario.positions.forEach(function (p) {
          var hist = historicalPrices[p.symbol];
          if (hist && hist[oldestDate]) {
            p.inceptionPrice = hist[oldestDate];
            p.inceptionDate = oldestIso;
          }
        });
        var weights = scenarioWeights(scenario);
        var snapshots = [];
        quarterEnds.forEach(function (qEnd) {
          var prices = {};
          scenario.positions.forEach(function (p) {
            var hist = historicalPrices[p.symbol];
            if (hist && hist[qEnd]) prices[p.symbol] = hist[qEnd];
          });
          var spyHist = historicalPrices[BENCHMARK_SYMBOL];
          if (spyHist && spyHist[qEnd]) prices[BENCHMARK_SYMBOL] = spyHist[qEnd];
          snapshots.push({ date: qEnd, prices: prices, weights: weights });
        });
        var today = dateOnly(new Date().toISOString());
        if (today > quarterEnds[quarterEnds.length - 1]) {
          var todayPrices = {};
          activePositions(scenario).forEach(function (p) {
            var price = currentPrice(p.symbol, scenario);
            if (price) todayPrices[p.symbol] = price;
          });
          var spyToday = currentPrice(BENCHMARK_SYMBOL, scenario);
          if (spyToday) todayPrices[BENCHMARK_SYMBOL] = spyToday;
          snapshots.push({ date: today, prices: todayPrices, weights: weights });
        }
        scenario.snapshots = snapshots;
      }

      function appendTrackingSnapshots() {
        var now = new Date().toISOString();
        store.scenarios = store.scenarios.map(function (s) {
          if (s.status !== "tracking") return s;
          return Object.assign({}, s, { snapshots: upsertSnapshot(s, snapshotForScenario(s, now)) });
        });
      }

      function snapshotForScenario(scenario, iso) {
        var prices = {};
        activePositions(scenario).forEach(function (p) {
          var price = currentPrice(p.symbol, scenario);
          if (price) prices[p.symbol] = price;
        });
        var spy = currentPrice(BENCHMARK_SYMBOL, scenario);
        if (spy) prices[BENCHMARK_SYMBOL] = spy;
        return { date: dateOnly(iso), prices: prices, weights: scenarioWeights(scenario) };
      }

      function upsertSnapshot(scenario, snapshot) {
        var existing = scenario.snapshots.filter(function (s) { return s.date !== snapshot.date; });
        existing.push(snapshot);
        existing.sort(function (a, b) { return a.date.localeCompare(b.date); });
        return existing.slice(-MAX_SNAPSHOTS);
      }

      function exportScenario() {
        download(JSON.stringify(currentScenario(), null, 2), safeName(currentScenario().name) + ".json", "application/json");
      }

      function exportAll() {
        download(JSON.stringify(store, null, 2), "ai-infra-tracker-backup.json", "application/json");
      }

      function exportMemo() {
        var scenario = currentScenario();
        var metrics = computeScenario(scenario);
        var lines = [];
        lines.push("# " + scenario.name);
        lines.push("");
        lines.push("Status: " + scenario.status);
        lines.push("Cumulative return: " + (metrics.cumulativeReturn == null ? "-" : signedPct(metrics.cumulativeReturn)));
        lines.push("Equal-weight benchmark: " + (metrics.equalReturn == null ? "-" : signedPct(metrics.equalReturn)));
        lines.push("SPY benchmark: " + (metrics.spyReturn == null ? "-" : signedPct(metrics.spyReturn)));
        lines.push("Coverage: " + fmtPct(metrics.coveragePct));
        lines.push("");
        lines.push("| Symbol | Weight | Inception | Current | Return | Contribution |");
        lines.push("|---|---:|---:|---:|---:|---:|");
        metrics.positions.filter(function (m) { return !m.position.removedAt; }).forEach(function (m) {
          lines.push("| " + m.position.symbol + " | " + fmtPct(m.position.weight) + " | " + priceText(m.inceptionPrice) + " | " + priceText(m.currentPrice) + " | " + (m.returnPct == null ? "-" : signedPct(m.returnPct)) + " | " + signedPct(m.contribution) + " |");
        });
        download(lines.join("\n"), safeName(scenario.name) + "-memo.md", "text/markdown");
      }

      function importJson(file) {
        var reader = new FileReader();
        reader.onload = function () {
          try {
            var parsed = JSON.parse(reader.result);
            if (parsed && parsed.schemaVersion === SCHEMA_VERSION && Array.isArray(parsed.scenarios)) {
              store = normalizeStore(parsed);
            } else if (parsed && parsed.id && Array.isArray(parsed.positions)) {
              var scenario = normalizeScenario(parsed);
              if (store.scenarios.some(function (s) { return s.id === scenario.id; })) scenario.id = uid("scn");
              store.scenarios.push(scenario);
              store.activeScenarioId = scenario.id;
            } else {
              throw new Error("Unsupported JSON shape.");
            }
            saveStore();
            render();
          } catch (err) {
            alert("Import failed: " + (err && err.message ? err.message : err));
          }
        };
        reader.readAsText(file);
      }

      function exportRawMigration() {
        download(migrationProblem ? migrationProblem.raw || "" : "", "ai-infra-tracker-raw-localstorage.json", "application/json");
      }

      function resetFactory() {
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(OLD_STORAGE_KEY);
        store = seedStore();
        migrationProblem = null;
        modal = null;
        activeTab = "scenarios";
        saveStore();
        render();
      }

      function download(content, filename, type) {
        var blob = new Blob([content], { type: type });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        setTimeout(function () {
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }, 0);
      }

      async function fetchText(url) {
        var response = await fetch(url, { cache: "no-store" });
        if (!response.ok) throw new Error("HTTP " + response.status);
        return response.text();
      }

      async function fetchJson(url) {
        var response = await fetch(url, { cache: "no-store" });
        if (!response.ok) throw new Error("HTTP " + response.status);
        return response.json();
      }

      function parseCsv(text) {
        return String(text || "").trim().split(/\r?\n/).map(function (line) {
          var out = [], cur = "", quoted = false;
          for (var i = 0; i < line.length; i += 1) {
            var ch = line[i];
            if (ch === '"' && line[i + 1] === '"') { cur += '"'; i += 1; }
            else if (ch === '"') quoted = !quoted;
            else if (ch === "," && !quoted) { out.push(cur); cur = ""; }
            else cur += ch;
          }
          out.push(cur);
          return out;
        });
      }

      function toStooqSymbol(symbol) {
        var s = String(symbol || "").trim().toLowerCase();
        return s.indexOf(".") >= 0 ? s : s + ".us";
      }

      function safeAsOf(date, time) {
        var now = new Date().toISOString();
        if (!date || !time || date === "N/D" || time === "N/D") return now;
        var parsed = new Date(date + "T" + time + "Z");
        return Number.isNaN(parsed.getTime()) ? now : parsed.toISOString();
      }

      function statusBadge(status) {
        return '<span class="badge ' + escAttr(status) + '">' + esc(status) + '</span>';
      }

      function priceCell(value) {
        return number(value) > 0 ? priceText(value) : "-";
      }

      function priceText(value) {
        return number(value) > 0 ? number(value).toFixed(number(value) >= 100 ? 2 : 3) : "-";
      }

      function delta(value) {
        if (value == null || !Number.isFinite(Number(value))) return '-';
        var n = number(value);
        return '<span class="delta ' + (n >= 0 ? 'pos' : 'neg') + '">' + signedPct(n) + '</span>';
      }

      function fmtPct(value) {
        return number(value).toFixed(1) + "%";
      }

      function signedPct(value) {
        if (value == null || !Number.isFinite(Number(value))) return "-";
        var n = number(value);
        return (n > 0 ? "+" : "") + n.toFixed(2) + "%";
      }

      function draftCoverage(metrics) {
        var priced = metrics.positions.filter(function (m) { return m.active && m.currentPrice > 0; }).length;
        return metrics.activeCount ? fmtPct(priced / metrics.activeCount * 100) : "-";
      }

      function nullDiff(a, b) {
        return a == null || b == null ? null : number(a) - number(b);
      }

      function number(value) {
        if (value == null || value === "") return 0;
        var n = Number(String(value).replace(/[$,%\s,]/g, ""));
        return Number.isFinite(n) ? n : 0;
      }

      function sum(list) {
        return list.reduce(function (acc, value) { return acc + number(value); }, 0);
      }

      function validTier(value) {
        return tiers.indexOf(value) >= 0 ? value : "Satellite";
      }

      function cleanSymbol(value) {
        return String(value || "").trim().toUpperCase();
      }

      function unique(list) {
        var seen = {};
        return list.filter(function (value) {
          var key = String(value || "");
          if (!key || seen[key]) return false;
          seen[key] = true;
          return true;
        });
      }

      function uid(prefix) {
        return prefix + "_" + Math.random().toString(36).slice(2, 10);
      }

      function attrNum(value) {
        return escAttr(String(number(value)));
      }

      function colorFor(label, index) {
        var hash = 0;
        String(label).split("").forEach(function (ch) { hash = (hash * 31 + ch.charCodeAt(0)) >>> 0; });
        return colors[(hash + index) % colors.length];
      }

      function daysBetween(start, end) {
        var a = new Date(start), b = new Date(end);
        if (Number.isNaN(a.getTime()) || Number.isNaN(b.getTime())) return 0;
        return Math.max(0, Math.floor((b - a) / 86400000));
      }

      function dateOnly(iso) {
        return new Date(iso).toISOString().slice(0, 10);
      }

      function compareDateOnly(date, iso) {
        return String(date).localeCompare(dateOnly(iso));
      }

      function dateDisplay(iso) {
        if (!iso) return "-";
        var d = new Date(iso);
        if (Number.isNaN(d.getTime())) return iso;
        return new Intl.DateTimeFormat(undefined, { month: "short", day: "numeric", year: "numeric" }).format(d);
      }

      function dateTimeDisplay(iso) {
        if (!iso) return "-";
        var d = new Date(iso);
        if (Number.isNaN(d.getTime())) return iso;
        return new Intl.DateTimeFormat(undefined, { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" }).format(d);
      }

      function safeName(name) {
        return String(name || "scenario").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "scenario";
      }

      function esc(value) {
        return String(value == null ? "" : value).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      function escAttr(value) {
        return esc(value).replace(/"/g, "&quot;");
      }

      render();
      setTimeout(function () {
        if (!migrationProblem && store.settings.onboardingDismissed) refreshQuotes();
      }, 600);
    }());
  </script>
</body>
</html>
